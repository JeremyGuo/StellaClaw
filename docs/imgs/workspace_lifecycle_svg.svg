<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" width="1400" height="920">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg2" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#080e1e"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#152033"/>
    </linearGradient>
    <!-- Step greens with progression -->
    <linearGradient id="green1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="green2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="green3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="green4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="cyan1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Filesystem highlight -->
    <linearGradient id="fsHighlightGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="fsHighlightCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#083344"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="panelShadow" x="-2%" y="-2%" width="106%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="stepShadow" x="-4%" y="-8%" width="112%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="toolShadow" x="-3%" y="-6%" width="110%" height="125%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowSlate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#64748b"/>
    </marker>

    <!-- Dot grid -->
    <pattern id="dotGrid2" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="url(#bg2)"/>
  <rect width="1400" height="920" fill="url(#dotGrid2)"/>

  <!-- ==================== TITLE ==================== -->
  <text x="700" y="40" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Workspace Sandbox — Lifecycle &amp; Cross-Agent Reuse</text>
  <text x="700" y="65" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" fill="#94a3b8">How workspaces are created, used, archived, and reused across agents</text>

  <!-- ==================== LEFT PANEL: LIFECYCLE ==================== -->
  <g filter="url(#panelShadow)">
    <rect x="25" y="85" width="730" height="800" rx="16" fill="url(#card2)" stroke="#334155" stroke-width="1" opacity="0.65"/>
  </g>
  <text x="390" y="115" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="3">WORKSPACE LIFECYCLE FLOW</text>

  <!-- Step 1: New Session -->
  <circle cx="112" cy="177" r="20" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="112" y="183" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">1</text>
  <g filter="url(#stepShadow)">
    <rect x="148" y="144" width="470" height="66" rx="12" fill="url(#green1)"/>
  </g>
  <text x="383" y="183" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#052e16">New Session</text>

  <line x1="383" y1="214" x2="383" y2="246" stroke="#475569" stroke-width="2.2" marker-end="url(#arrowSlate)"/>

  <!-- Step 2: Initialize workspace -->
  <circle cx="112" cy="287" r="20" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="112" y="293" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">2</text>
  <g filter="url(#stepShadow)">
    <rect x="148" y="254" width="470" height="66" rx="12" fill="url(#green2)"/>
  </g>
  <text x="383" y="283" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#052e16">Initialize workspace</text>
  <text x="383" y="303" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" fill="#064e3b">from rundir template</text>

  <line x1="383" y1="324" x2="383" y2="356" stroke="#475569" stroke-width="2.2" marker-end="url(#arrowSlate)"/>

  <!-- Step 3: Main Agent works -->
  <circle cx="112" cy="397" r="20" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="112" y="403" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">3</text>
  <g filter="url(#stepShadow)">
    <rect x="148" y="364" width="470" height="66" rx="12" fill="url(#green3)"/>
  </g>
  <text x="383" y="392" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#f0fdf4">Main Agent works in</text>
  <text x="383" y="412" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#bbf7d0">workspaces/&lt;id&gt;/files/</text>

  <line x1="383" y1="434" x2="383" y2="466" stroke="#475569" stroke-width="2.2" marker-end="url(#arrowSlate)"/>

  <!-- Step 4: Session Closes -->
  <circle cx="112" cy="507" r="20" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="112" y="513" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">4</text>
  <g filter="url(#stepShadow)">
    <rect x="148" y="474" width="470" height="66" rx="12" fill="url(#green4)"/>
  </g>
  <text x="383" y="513" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#dcfce7">Session Closes</text>

  <line x1="383" y1="544" x2="383" y2="576" stroke="#475569" stroke-width="2.2" marker-end="url(#arrowSlate)"/>

  <!-- Step 5: Summary Generated -->
  <circle cx="112" cy="617" r="20" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="112" y="623" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">5</text>
  <g filter="url(#stepShadow)">
    <rect x="148" y="584" width="470" height="66" rx="12" fill="url(#cyan1)"/>
  </g>
  <text x="383" y="612" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#083344">Summary Generated</text>
  <text x="383" y="632" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" fill="#0e4458">(summary.md written)</text>

  <line x1="383" y1="654" x2="383" y2="686" stroke="#475569" stroke-width="2.2" marker-end="url(#arrowSlate)"/>

  <!-- Step 6: History Pool -->
  <circle cx="112" cy="727" r="20" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="112" y="733" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">6</text>
  <g filter="url(#stepShadow)">
    <rect x="148" y="694" width="470" height="66" rx="12" fill="url(#blue1)"/>
  </g>
  <text x="383" y="722" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#f8fafc">Workspace enters</text>
  <text x="383" y="742" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#f8fafc">History Pool</text>

  <!-- ==================== Connecting curve: lifecycle → tools ==================== -->
  <path d="M 622 727 C 710 727 730 530 800 470" stroke="#64748b" stroke-width="2.5" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowGray)" opacity="0.7"/>
  <text x="738" y="565" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8" font-style="italic">reuse via</text>
  <text x="738" y="582" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#94a3b8" font-style="italic">tools</text>

  <!-- ==================== RIGHT PANEL TOP: TOOLS ==================== -->
  <g filter="url(#panelShadow)">
    <rect x="790" y="85" width="585" height="405" rx="16" fill="url(#card2)" stroke="#334155" stroke-width="1" opacity="0.65"/>
  </g>
  <text x="1082" y="115" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="3">CROSS-WORKSPACE REUSE TOOLS</text>

  <!-- Tool 1 -->
  <g filter="url(#toolShadow)">
    <rect x="820" y="135" width="525" height="74" rx="10" fill="url(#toolGrad)" opacity="0.9"/>
  </g>
  <text x="1082" y="166" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="700" fill="#f8fafc">workspaces_list</text>
  <text x="1082" y="188" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#bfdbfe">List all history workspaces</text>

  <!-- Tool 2 -->
  <g filter="url(#toolShadow)">
    <rect x="820" y="223" width="525" height="74" rx="10" fill="url(#toolGrad)" opacity="0.9"/>
  </g>
  <text x="1082" y="254" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="700" fill="#f8fafc">workspace_content_list</text>
  <text x="1082" y="276" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#bfdbfe">Browse workspace contents</text>

  <!-- Tool 3 -->
  <g filter="url(#toolShadow)">
    <rect x="820" y="311" width="525" height="74" rx="10" fill="url(#toolGrad)" opacity="0.9"/>
  </g>
  <text x="1082" y="342" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="700" fill="#f8fafc">workspace_mount</text>
  <text x="1082" y="364" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#bfdbfe">Read-only snapshot mount</text>

  <!-- Tool 4 -->
  <g filter="url(#toolShadow)">
    <rect x="820" y="399" width="525" height="74" rx="10" fill="url(#toolGrad)" opacity="0.9"/>
  </g>
  <text x="1082" y="430" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="700" fill="#f8fafc">workspace_content_move</text>
  <text x="1082" y="452" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#bfdbfe">Move content across workspaces</text>

  <!-- ==================== RIGHT PANEL BOTTOM: FILESYSTEM ==================== -->
  <g filter="url(#panelShadow)">
    <rect x="790" y="510" width="585" height="375" rx="16" fill="url(#card2)" stroke="#334155" stroke-width="1" opacity="0.65"/>
  </g>
  <text x="1082" y="540" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="3">FILESYSTEM LAYOUT</text>

  <!-- FS entry 1 -->
  <rect x="820" y="558" width="525" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" opacity="0.9"/>
  <text x="840" y="582" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#94a3b8">workdir/sandbox/workspaces.json</text>

  <!-- FS entry 2 -->
  <rect x="820" y="606" width="525" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" opacity="0.9"/>
  <text x="840" y="630" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#94a3b8">workdir/sandbox/workspace_meta/</text>

  <!-- FS entry 3 (indented) -->
  <rect x="820" y="654" width="525" height="38" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.8" opacity="0.9"/>
  <text x="870" y="678" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#cbd5e1">└─ &lt;id&gt;/summary.md</text>

  <!-- FS entry 4 -->
  <rect x="820" y="702" width="525" height="38" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8" opacity="0.9"/>
  <text x="840" y="726" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#94a3b8">workdir/workspaces/</text>

  <!-- FS entry 5 (highlighted green) -->
  <rect x="820" y="750" width="525" height="38" rx="6" fill="url(#fsHighlightGreen)" stroke="#166534" stroke-width="0.8" opacity="0.9"/>
  <text x="870" y="774" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#4ade80">└─ &lt;id&gt;/files/</text>
  <text x="1100" y="774" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#86efac" opacity="0.7">← agent workdir</text>

  <!-- FS entry 6 (highlighted cyan) -->
  <rect x="820" y="798" width="525" height="38" rx="6" fill="url(#fsHighlightCyan)" stroke="#0e7490" stroke-width="0.8" opacity="0.9"/>
  <text x="870" y="822" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#22d3ee">└─ &lt;id&gt;/mounts/</text>
  <text x="1100" y="822" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#67e8f9" opacity="0.7">← snapshots</text>

  <!-- ==================== Bottom note ==================== -->
  <text x="700" y="905" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#475569" font-style="italic">Each workspace is isolated. Reuse is explicit and tool-mediated.</text>
</svg>
