<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" width="1200" height="880">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#080816"/>
    </linearGradient>
    <!-- Card gradients -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#14142c"/>
    </linearGradient>
    <!-- Indigo family -->
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="indigo2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="indigo3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <!-- Teal -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- Purple family -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="purple2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="purple3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Workspace -->
    <linearGradient id="workspaceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <!-- Amber family -->
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="amber2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="amber3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="cardShadow" x="-3%" y="-3%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="itemShadow" x="-4%" y="-8%" width="112%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glowIndigo" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#818cf8" flood-opacity="0.15"/>
    </filter>
    <filter id="glowTeal" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2dd4bf" flood-opacity="0.15"/>
    </filter>
    <filter id="glowPurple" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.15"/>
    </filter>
    <filter id="glowAmber" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#fbbf24" flood-opacity="0.15"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowLavender" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#a5b4fc"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrowIndigoRev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 2 L 0 5 L 10 8 Z" fill="#6366f1"/>
    </marker>

    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#ffffff" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="880" fill="url(#bgGrad)"/>
  <rect width="1200" height="880" fill="url(#dotGrid)"/>

  <!-- ==================== TITLE ==================== -->
  <text x="600" y="42" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">ClawParty 2.0 — System Architecture</text>
  <text x="600" y="67" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="13" fill="#64748b">Layered overview: channels → session → agents → scheduling</text>

  <!-- ==================== LAYER 1: CHANNELS ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="88" width="1120" height="118" rx="14" fill="url(#cardGrad)" stroke="#2a2a50" stroke-width="1"/>
  </g>
  <text x="72" y="113" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#818cf8" letter-spacing="2.5">CHANNELS</text>

  <g filter="url(#itemShadow)">
    <rect x="80" y="124" width="330" height="62" rx="10" fill="url(#indigoGrad)"/>
  </g>
  <text x="245" y="161" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">Telegram Bot</text>

  <g filter="url(#itemShadow)">
    <rect x="435" y="124" width="330" height="62" rx="10" fill="url(#indigo2Grad)"/>
  </g>
  <text x="600" y="161" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">CLI</text>

  <g filter="url(#itemShadow)">
    <rect x="790" y="124" width="330" height="62" rx="10" fill="url(#indigo3Grad)"/>
  </g>
  <text x="955" y="161" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#e0e0ff" opacity="0.8">Future…</text>

  <!-- Arrow: Channels → Session -->
  <line x1="600" y1="210" x2="600" y2="233" stroke="#2dd4bf" stroke-width="2.5" marker-end="url(#arrowTeal)" opacity="0.85"/>

  <!-- ==================== LAYER 2: SESSION ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="240" width="1120" height="118" rx="14" fill="url(#cardGrad)" stroke="#2a2a50" stroke-width="1"/>
  </g>
  <text x="72" y="265" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#2dd4bf" letter-spacing="2.5">SESSION</text>

  <g filter="url(#itemShadow)">
    <rect x="180" y="276" width="840" height="62" rx="10" fill="url(#tealGrad)"/>
  </g>
  <text x="600" y="313" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#042f2e">Persistent State + Attachments</text>

  <!-- Arrow: Session → Agents -->
  <line x1="600" y1="362" x2="600" y2="385" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrowPurple)" opacity="0.85"/>

  <!-- ==================== LAYER 3: AGENT TOPOLOGY ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="392" width="1120" height="270" rx="14" fill="url(#cardGrad)" stroke="#2a2a50" stroke-width="1"/>
  </g>
  <text x="72" y="417" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#a78bfa" letter-spacing="2.5">AGENT TOPOLOGY</text>

  <!-- Workspace bar -->
  <g filter="url(#glowPurple)">
    <rect x="120" y="430" width="960" height="55" rx="10" fill="url(#workspaceGrad)" stroke="#4338ca" stroke-width="0.5" opacity="0.9"/>
  </g>
  <text x="600" y="463" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#c7d2fe">Workspace  (durable · per-agent · isolated filesystem)</text>

  <!-- Agent: Main Foreground -->
  <g filter="url(#itemShadow)">
    <rect x="62" y="510" width="340" height="130" rx="12" fill="url(#purpleGrad)"/>
  </g>
  <text x="232" y="555" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Main Foreground</text>
  <text x="232" y="575" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Agent</text>
  <text x="232" y="610" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#e2d6ff" opacity="0.85">(user-facing)</text>

  <!-- Agent: Main Background -->
  <g filter="url(#itemShadow)">
    <rect x="430" y="510" width="340" height="130" rx="12" fill="url(#purple2Grad)"/>
  </g>
  <text x="600" y="555" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Main Background</text>
  <text x="600" y="575" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Agent</text>
  <text x="600" y="610" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#e2d6ff" opacity="0.85">(long-running tasks)</text>

  <!-- Agent: Sub-Agent -->
  <g filter="url(#itemShadow)">
    <rect x="798" y="510" width="340" height="130" rx="12" fill="url(#purple3Grad)"/>
  </g>
  <text x="968" y="560" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Sub-Agent</text>
  <text x="968" y="610" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#e2d6ff" opacity="0.85">(short-lived tasks)</text>

  <!-- Arrows: Agents → Workspace -->
  <line x1="232" y1="510" x2="232" y2="488" stroke="#a5b4fc" stroke-width="1.8" marker-end="url(#arrowLavender)" opacity="0.8"/>
  <line x1="600" y1="510" x2="600" y2="488" stroke="#a5b4fc" stroke-width="1.8" marker-end="url(#arrowLavender)" opacity="0.8"/>
  <line x1="968" y1="510" x2="968" y2="488" stroke="#a5b4fc" stroke-width="1.8" marker-end="url(#arrowLavender)" opacity="0.8"/>

  <!-- Bidirectional arrows between agents (wider gap) -->
  <line x1="404" y1="575" x2="428" y2="575" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" marker-start="url(#arrowIndigoRev)" marker-end="url(#arrowIndigo)"/>
  <line x1="770" y1="575" x2="796" y2="575" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" marker-start="url(#arrowIndigoRev)" marker-end="url(#arrowIndigo)"/>

  <!-- Arrow: Agents → Cron -->
  <line x1="600" y1="666" x2="600" y2="693" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrowAmber)" opacity="0.85"/>

  <!-- ==================== LAYER 4: CRON / SINK ==================== -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="700" width="1120" height="138" rx="14" fill="url(#cardGrad)" stroke="#2a2a50" stroke-width="1"/>
  </g>
  <text x="72" y="725" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#fbbf24" letter-spacing="2.5">CRON / SINK</text>

  <g filter="url(#itemShadow)">
    <rect x="80" y="738" width="330" height="75" rx="10" fill="url(#amberGrad)"/>
  </g>
  <text x="245" y="782" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#451a03">Scheduled Tasks</text>

  <g filter="url(#itemShadow)">
    <rect x="435" y="738" width="330" height="75" rx="10" fill="url(#amber2Grad)"/>
  </g>
  <text x="600" y="782" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#451a03">Direct Routing</text>

  <g filter="url(#itemShadow)">
    <rect x="790" y="738" width="330" height="75" rx="10" fill="url(#amber3Grad)"/>
  </g>
  <text x="955" y="782" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#451a03">Broadcast Topics</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="300" y="852" width="18" height="12" rx="3" fill="#818cf8"/>
  <text x="325" y="862" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#94a3b8">Channels</text>

  <rect x="440" y="852" width="18" height="12" rx="3" fill="#2dd4bf"/>
  <text x="465" y="862" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#94a3b8">Session</text>

  <rect x="570" y="852" width="18" height="12" rx="3" fill="#a78bfa"/>
  <text x="595" y="862" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#94a3b8">Agents</text>

  <rect x="700" y="852" width="18" height="12" rx="3" fill="#fbbf24"/>
  <text x="725" y="862" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#94a3b8">Cron / Sink</text>
</svg>
