<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#080816"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="200" rx="16" fill="url(#bg)"/>

  <!-- Glow effects -->
  <ellipse cx="200" cy="100" rx="180" ry="100" fill="#6366f1" opacity="0.08" filter="url(#blur1)"/>
  <ellipse cx="620" cy="100" rx="180" ry="100" fill="#2dd4bf" opacity="0.06" filter="url(#blur1)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.12" fill="#818cf8">
    <circle cx="40" cy="40" r="1.2"/>  <circle cx="70" cy="40" r="1.2"/>  <circle cx="100" cy="40" r="1.2"/>
    <circle cx="40" cy="60" r="1.2"/>  <circle cx="70" cy="60" r="1.2"/>  <circle cx="100" cy="60" r="1.2"/>
    <circle cx="40" cy="80" r="1.2"/>  <circle cx="70" cy="80" r="1.2"/>  <circle cx="100" cy="80" r="1.2"/>
    <circle cx="720" cy="120" r="1.2"/><circle cx="750" cy="120" r="1.2"/><circle cx="780" cy="120" r="1.2"/>
    <circle cx="720" cy="140" r="1.2"/><circle cx="750" cy="140" r="1.2"/><circle cx="780" cy="140" r="1.2"/>
    <circle cx="720" cy="160" r="1.2"/><circle cx="750" cy="160" r="1.2"/><circle cx="780" cy="160" r="1.2"/>
  </g>

  <!-- Claw icon -->
  <g transform="translate(120, 52)">
    <!-- Claw shape using paths -->
    <g fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Three claw arcs -->
      <path d="M 10 60 Q 10 10, 30 4" opacity="0.9"/>
      <path d="M 25 62 Q 30 15, 48 2" opacity="0.95"/>
      <path d="M 42 60 Q 50 18, 66 6" opacity="0.9"/>
      <!-- Base pad -->
      <ellipse cx="28" cy="72" rx="26" ry="14" stroke-width="2.5" opacity="0.5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="230" y="92" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="url(#accent)" letter-spacing="-1">
    ClawParty
  </text>

  <!-- Tagline line -->
  <line x1="230" y1="112" x2="580" y2="112" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Tagline -->
  <text x="230" y="138" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-weight="400" font-size="16" fill="#a5b4fc" letter-spacing="0.5" opacity="0.8">
    Agents as services, not scripts.
  </text>

  <!-- Version badge -->
  <g transform="translate(230, 148)">
    <rect width="56" height="22" rx="4" fill="#1e1e3a" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="28" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#818cf8" text-anchor="middle" font-weight="600">v0.14</text>
  </g>
  <g transform="translate(296, 148)">
    <rect width="44" height="22" rx="4" fill="#1e1e3a" stroke="#2dd4bf" stroke-opacity="0.3" stroke-width="1"/>
    <text x="22" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#2dd4bf" text-anchor="middle" font-weight="600">Rust</text>
  </g>
  <g transform="translate(350, 148)">
    <rect width="52" height="22" rx="4" fill="#1e1e3a" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="1"/>
    <text x="26" y="15" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">53K+</text>
  </g>

  <!-- Decorative right-side connection nodes -->
  <g opacity="0.5">
    <!-- Telegram node -->
    <circle cx="650" cy="50" r="16" fill="#1e1e3a" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="650" y="55" font-size="16" text-anchor="middle">💬</text>
    <!-- Model node -->
    <circle cx="710" cy="90" r="16" fill="#1e1e3a" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="710" y="95" font-size="16" text-anchor="middle">🧠</text>
    <!-- Tool node -->
    <circle cx="660" cy="135" r="16" fill="#1e1e3a" stroke="#2dd4bf" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="660" y="140" font-size="16" text-anchor="middle">🔧</text>
    <!-- Connection lines -->
    <line x1="650" y1="66" x2="710" y2="74" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="710" y1="106" x2="660" y2="119" stroke="#a78bfa" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="650" y1="66" x2="660" y2="119" stroke="#2dd4bf" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
</svg>
