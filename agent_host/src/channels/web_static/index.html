<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawParty Web</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-head">
      <h1>ClawParty</h1>
      <button type="button" id="new-conversation-btn">New</button>
    </div>
    <div id="conversation-list" aria-label="Conversations"></div>
  </aside>
  <div id="chat-shell">
    <header id="topbar">
      <div id="conversation-title">web-default</div>
      <div id="conversation-controls">
        <button type="button" id="refresh-btn">Refresh</button>
        <div id="connection-status" class="disconnected">●</div>
      </div>
    </header>
    <main id="main">
      <section id="messages"></section>
      <form id="input-form">
        <textarea id="input" placeholder="Type a message…" rows="2"></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </main>
  </div>
</div>
<script src="/assets/app.js"></script>
</body>
</html>
