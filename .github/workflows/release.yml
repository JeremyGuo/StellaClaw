name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      notes: ${{ steps.prepare.outputs.notes }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Prepare release metadata
        id: prepare
        shell: bash
        run: |
          version="$(python3 scripts/version_info.py version)"
          tag="v${version}"
          python3 scripts/version_info.py notes > RELEASE_NOTES.md

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- VERSION; then
              version_changed=false
            else
              version_changed=true
            fi
          else
            version_changed=true
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_exists=true
          else
            tag_exists=false
          fi

          if [[ "${version_changed}" == "true" && "${tag_exists}" == "false" ]]; then
            should_release=true
          else
            should_release=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            artifact_suffix: linux-aarch64
          - target: armv7-unknown-linux-musleabihf
            artifact_suffix: linux-armv7
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build release binaries
        run: |
          cargo zigbuild --manifest-path agent_frame/Cargo.toml --release --bin run_agent --target ${{ matrix.target }}
          cargo zigbuild --manifest-path agent_host/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/run_agent" dist/
          cp "target/${{ matrix.target }}/release/agent_host" dist/
          cp README.md dist/
          cp VERSION dist/
          cp docs/DEPLOY.md dist/
          if [[ -f .env.example ]]; then
            cp .env.example dist/
          fi
          tar -czf "clawparty2-${{ needs.prepare.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz" -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawparty2-${{ matrix.artifact_suffix }}
          path: clawparty2-${{ needs.prepare.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz

  publish:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Create release tag
        shell: bash
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/${{ needs.prepare.outputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ needs.prepare.outputs.tag }}" "${{ needs.prepare.outputs.head_sha }}"
            git push origin "refs/tags/${{ needs.prepare.outputs.tag }}"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p dist
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} dist/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.head_sha }}
          body: ${{ needs.prepare.outputs.notes }}
          files: dist/*.tar.gz
