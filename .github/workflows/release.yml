name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}
      notes: ${{ steps.prepare.outputs.notes }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Prepare release metadata
        id: prepare
        shell: bash
        run: |
          version="$(python3 scripts/version_info.py version)"
          tag="v${version}"
          python3 scripts/version_info.py notes > RELEASE_NOTES.md

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            if git diff --quiet HEAD^ HEAD -- VERSION; then
              version_changed=false
            else
              version_changed=true
            fi
          else
            version_changed=true
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_exists=true
          else
            tag_exists=false
          fi

          if [[ "${version_changed}" == "true" && "${tag_exists}" == "false" ]]; then
            should_release=true
          else
            should_release=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            cat RELEASE_NOTES.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-server:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/stellaclaw dist/
          cp target/release/agent_server dist/
          cp VERSION dist/
          cp example_config.json dist/
          tar -czf "stellaclaw-${{ needs.prepare.outputs.version }}-linux-x86_64.tar.gz" -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellaclaw-linux-x86_64
          path: stellaclaw-${{ needs.prepare.outputs.version }}-linux-x86_64.tar.gz

  build-stellacode:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
            args: "--arm64"
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/stellacode
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/stellacode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync version from VERSION file
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Setting Stellacode package version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Build Stellacode (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.args || '' }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Stellacode artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stellacode-${{ matrix.os }}
          path: |
            apps/stellacode/dist/*.exe
            apps/stellacode/dist/*.dmg
            apps/stellacode/dist/*.zip
            apps/stellacode/dist/*.AppImage
            apps/stellacode/dist/*.tar.gz
            apps/stellacode/dist/*.yml
            apps/stellacode/dist/*.blockmap
          if-no-files-found: warn

  publish:
    needs:
      - prepare
      - build-server
      - build-stellacode
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Create release tag
        shell: bash
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/${{ needs.prepare.outputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ needs.prepare.outputs.tag }}" "${{ needs.prepare.outputs.head_sha }}"
            git push origin "refs/tags/${{ needs.prepare.outputs.tag }}"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p dist
          find release-artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.yml' -o -name '*.blockmap' \) -exec cp {} dist/ \;
          ls -lh dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.head_sha }}
          body: ${{ needs.prepare.outputs.notes }}
          files: dist/*
